<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruta ZZZ999 — 3 paradas</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, Roboto, Arial, sans-serif; }
  body { display:flex; flex-direction:column; height:100vh; }
  header {
    background:#1a73e8; color:#fff; padding:14px 18px;
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px;
  }
  header h1 { font-size:17px; font-weight:600; }
  header span { font-size:13px; opacity:0.9; }
  #container { display:flex; flex:1; min-height:0; }
  #map { flex:1; min-width:0; }
  #sidebar {
    width:340px; max-width:40vw; overflow-y:auto; background:#fafafa;
    border-left:1px solid #e0e0e0;
  }
  .parada {
    display:flex; align-items:center; gap:10px; padding:12px 14px;
    border-bottom:1px solid #eee; cursor:pointer; transition:background .15s;
  }
  .parada:hover { background:#eef3ff; }
  .num-badge {
    width:28px; height:28px; border-radius:50%; background:#1a73e8; color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px;
    flex-shrink:0;
  }
  .parada-info { flex:1; display:flex; flex-direction:column; min-width:0; }
  .parada-info strong { font-size:13.5px; color:#202124; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .parada-info span { font-size:12px; color:#5f6368; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .btn-ir {
    background:#1a73e8; color:#fff; text-decoration:none; font-size:12px;
    padding:6px 10px; border-radius:5px; flex-shrink:0; font-weight:600;
  }
  @media (max-width: 700px) {
    #container { flex-direction:column; }
    #sidebar { width:100%; max-width:100%; max-height:35vh; }
    #map { flex:1; min-height:40vh; }
  }
</style>
</head>
<body>

<header>
  <h1>🚚 Ruta — Placa ZZZ999</h1>
  <span>3 paradas · Gestor: Pedro Gomez</span>
</header>

<div id="container">
  <div id="map"></div>
  <div id="sidebar">
        <div class="parada" onclick="centrarEnParada(0)">
          <div class="num-badge">1</div>
          <div class="parada-info">
            <strong>Cliente Test B</strong>
            <span>Av. Test 2, San Isidro</span>
          </div>
          <a class="btn-ir" href="https://www.google.com/maps/dir/?api=1&destination=-12.051374,-77.048793" target="_blank" onclick="event.stopPropagation()">Ir</a>
        </div>
        <div class="parada" onclick="centrarEnParada(1)">
          <div class="num-badge">2</div>
          <div class="parada-info">
            <strong>Cliente Test A</strong>
            <span>Av. Test 1, Miraflores</span>
          </div>
          <a class="btn-ir" href="https://www.google.com/maps/dir/?api=1&destination=-12.046374,-77.042793" target="_blank" onclick="event.stopPropagation()">Ir</a>
        </div>
        <div class="parada" onclick="centrarEnParada(2)">
          <div class="num-badge">3</div>
          <div class="parada-info">
            <strong>Cliente Test C</strong>
            <span>Av. Test 3, Surco</span>
          </div>
          <a class="btn-ir" href="https://www.google.com/maps/dir/?api=1&destination=-12.060374,-77.038793" target="_blank" onclick="event.stopPropagation()">Ir</a>
        </div></div>
</div>

<script>
  const paradas = [
      {lat:-12.051374, lng:-77.048793, num:1, nombre:"Cliente Test B", cod:"002", dir:"Av. Test 2", distrito:"San Isidro"},
      {lat:-12.046374, lng:-77.042793, num:2, nombre:"Cliente Test A", cod:"001", dir:"Av. Test 1", distrito:"Miraflores"},
      {lat:-12.060374, lng:-77.038793, num:3, nombre:"Cliente Test C", cod:"003", dir:"Av. Test 3", distrito:"Surco"}
  ];

  let map, markers = [], infoWindow;

  function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
      zoom: 12,
      center: { lat: -12.052707333333332, lng: -77.04345966666666 },
      mapTypeControl: false,
      streetViewControl: false,
    });

    infoWindow = new google.maps.InfoWindow();
    const bounds = new google.maps.LatLngBounds();
    const rutaCoords = [];

    paradas.forEach((p, i) => {
      const pos = { lat: p.lat, lng: p.lng };
      rutaCoords.push(pos);
      bounds.extend(pos);

      const marker = new google.maps.Marker({
        position: pos,
        map: map,
        label: { text: String(p.num), color: "#fff", fontWeight: "700", fontSize: "13px" },
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          fillColor: "#1a73e8",
          fillOpacity: 1,
          strokeColor: "#ffffff",
          strokeWeight: 2,
          scale: 14,
        },
      });

      marker.addListener("click", () => {
        infoWindow.setContent(
          `<div style="font-family:Arial;max-width:220px">
             <strong>${p.num}. ${p.nombre}</strong><br/>
             <span style="font-size:12px;color:#555">${p.dir}, ${p.distrito}</span><br/>
             <a href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}"
                target="_blank" style="font-size:12px">Cómo llegar →</a>
           </div>`
        );
        infoWindow.open(map, marker);
      });

      markers.push(marker);
    });

    new google.maps.Polyline({
      path: rutaCoords,
      geodesic: true,
      strokeColor: "#1a73e8",
      strokeOpacity: 0.7,
      strokeWeight: 3,
      map: map,
    });

    map.fitBounds(bounds);
  }

  function centrarEnParada(i) {
    map.panTo(markers[i].getPosition());
    map.setZoom(16);
    google.maps.event.trigger(markers[i], "click");
  }

  window.initMap = initMap;
</script>
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAgKdPPLn0UlClWQQLQymLSOCCNTTu3qq4&callback=initMap">
</script>

</body>
</html>
